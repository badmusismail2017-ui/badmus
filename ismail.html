<!DOCTYPE html>
<html>
    <head>
     <title>zoom-box</title>
     <style>
      .zoom-box {
        width: 300px;
        height: 200px;
        overflow: hidden; /* prevents image overflow */
      }

      .zoom-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .zoom-box:hover img {
        transform: scale(1.2); /* zoom in */
      }

     </style>
    </head>

    <body>
     <div class="zoom-box">
      <img src="logo/instagram-logo.webp" alt="Zoom Image">
     </div>

    </body>
</html>
